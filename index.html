<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Levin</title>
    <style>
        :root {
            --fg: #1a1a1a;
            --muted: #666;
            --bg: #fafafa;
            --accent: #0366d6;
            --border: #e1e4e8;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            margin: 0;
            line-height: 1.6;
        }
        main {
            max-width: 640px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }
        h1 {
            font-size: 2rem;
            margin: 0 0 0.5rem;
        }
        h2 {
            font-size: 1.1rem;
            margin: 2.5rem 0 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        p { margin: 0 0 1rem; }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li { margin: 0.4rem 0; }
        a {
            color: var(--accent);
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
        .links a {
            display: inline-block;
            margin-right: 1rem;
        }
        footer {
            margin-top: 4rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Michael Levin</h1>
        <p>Hi, I'm Michael Levin. Welcome to my website.</p>

        <h2>Links</h2>
        <ul class="links">
            <li><a href="https://www.linkedin.com/in/mvlevin">LinkedIn</a></li>
            <li><a href="https://www.github.com/reluctant-enthusiast">GitHub</a></li>
        </ul>

        <h2>Files</h2>
        <p>Nothing here yet.</p>

        <footer>
            &copy; Michael Levin
        </footer>
    </main>
</body>
</html>
