<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { width: 300px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; }
        #task-input { width: calc(100% - 22px); padding: 10px; }
        #add-button { padding: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #ddd; }
        .completed { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <div class="container">
        <h2>To-Do List</h2>
        <input type="text" id="task-input" placeholder="Add a new task..."><button id="add-button">Add</button>
        <ul id="task-list"></ul>
    </div>
    <script>
        // Retrieve tasks from local storage
        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        const taskList = document.getElementById('task-list');
        const taskInput = document.getElementById('task-input');
        const addButton = document.getElementById('add-button');

        // Function to render tasks
        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.textContent = task.text;
                li.className = task.completed ? 'completed' : '';
                li.addEventListener('click', () => toggleTask(index));
                taskList.appendChild(li);

                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Delete';
                deleteButton.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTask(index);
                });
                li.appendChild(deleteButton);
            });
        }

        // Function to add a task
        function addTask() {
            const text = taskInput.value;
            if (text) {
                tasks.push({ text, completed: false });
                saveTasks();
                taskInput.value = '';
                renderTasks();
            }
        }

        // Function to toggle task completion
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        }

        // Function to delete a task
        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }

        // Function to save tasks to local storage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        addButton.addEventListener('click', addTask);
        renderTasks();
    </script>
</body>
</html>
